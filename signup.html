<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Signup</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <span class="logo-text">LibraryMS</span>
    </div>
    <h2>Create account</h2>
    <p class="subtitle">Join the library and start borrowing</p>

    <input type="text" id="name" placeholder="Full name">
    <input type="email" id="email" placeholder="Email address">
    <input type="password" id="password" placeholder="Password">

    <button class="btn-primary" onclick="signup()">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="student_login.html">Log in</a>
    </div>
  </div>
</div>

</body>
</html>
